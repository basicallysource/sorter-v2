# SorterOS build config — OrangePi CM5 on the Tablet Base Board, official
# OrangePi vendor image with Rockchip BSP kernel 6.1.43.
#
# This is the direct CM5-tablet analogue of the OPi 5 flow in config.toml
# (Orangepi5_1.2.2_ubuntu_jammy_server_linux6.1.99): same Ubuntu Jammy
# userspace, same Rockchip vendor 6.1 kernel family, so the MPP/RGA/NPU
# runtime nodes (/dev/mpp_service, /dev/rga, /dev/dma_heap, RKNPU) are
# expected to be present — unlike the 25.02 tablet base in config-cm5.toml,
# which boots mainline 6.13 without them.
#
# Run with: sudo python build.py --config config-cm5-tablet-vendor61.toml
# After first boot the acceptance probes run automatically; check
# /var/lib/sorteros/camera-transport-status.json on the device.

[base]
# Official OrangePi CM5 Ubuntu image folder (orangepi.org → Orange Pi CM5 →
# Ubuntu Image downloads). Google Drive is token-gated, so download the .7z
# manually and drop it (or the extracted .img) into cache/:
#   https://drive.google.com/drive/folders/1rfsIJjzKyOGdI6iIcAPWzzSpmvaBte0u
# build.py extracts cache/Orangepicm5-tablet_1.0.0_ubuntu_jammy_server_linux6.1.43.7z
# automatically (needs a 7z binary).
url = "https://drive.google.com/drive/folders/1rfsIJjzKyOGdI6iIcAPWzzSpmvaBte0u"
filename = "Orangepicm5-tablet_1.0.0_ubuntu_jammy_server_linux6.1.43.img"
sha256 = ""  # fill in after the first manual download

[output]
dir = "out"
version = "4.1.0-cm5-tablet-vendor61.0"
name = "sorteros-v{version}-{date}.img"

[chroot]
# Same package set as config-cm5-vendor61.toml: Rockchip multimedia PPA stack
# (chroot_apt.sh) + PyGObject for the GStreamer capture bindings. Jammy ships
# Python 3.10, so python3-tomli is required (not redundant like on Noble).
packages = [
    "network-manager",
    "sudo",
    "python3-pip",
    "python3-tomli",
    "libgl1",
    "libglib2.0-0",
    "v4l-utils",
    "libv4l-0",
    "libv4l-dev",
    "libv4l-rkmpp",
    "ffmpeg",
    "librockchip-mpp1",
    "librockchip-mpp-dev",
    "librockchip-vpu0",
    "librga2",
    "librga-dev",
    "gstreamer1.0-rockchip1",
    "python3-gi",
    "gir1.2-gstreamer-1.0",
    "gir1.2-gst-plugins-base-1.0",
    "rockchip-multimedia-config",
    "rockchip-mpp-demos",
    "git-lfs",
    "cloud-guest-utils",
    "figlet",
    "systemd-timesyncd",
    "qrencode",
]
extra_curl_installs = ["node22", "tailscale", "portal-py-deps"]

[branch]
default = "sorthive"

[overlay]
# The official tablet vendor image ships the tablet DTB and auto-detects the
# carrier WiFi — no orangepiEnv.txt overlay needed (same as config-cm5.toml).
wifi_overlay = ""

[camera_transport]
profile = "rk3588-rockchip-mpp-rga-rknn"
description = "Target RK3588 stack: one capture and one Rockchip MPP H.264 WebRTC encoder per physical camera, RGA scale/convert, and RKNN/NPU inference."
required_machine = "aarch64"
# Official tablet vendor image boots the Rockchip BSP 6.1.43 kernel — the same
# vendor 6.1 family the OPi 5 flow relies on for the MPP/RGA/DMA runtime nodes.
required_kernel_release_patterns = [
    "^6\\.1\\.",
]
required_runtime_gates = [
    "python_webrtc",
    "assigned_camera_sources_exist",
    "single_capture_per_physical_source",
    "one_encoder_per_physical_source_target",
    "ffmpeg_rkmpp_advertised",
    "ffmpeg_rkmpp_runtime",
    "ffmpeg_rkrga_filters_advertised",
    "ffmpeg_rkrga_runtime",
    "mpp_service_node",
    "rga_node",
    "dma_heap_node",
    "drm_render_node",
    "production_hardware_encoder",
    "hardware_h264_source_factory_registered",
    "webrtc_hardware_bridge_implemented",
    "hardware_scale_convert_source_pipeline",
    "zero_copy_source_pipeline",
    "source_pipeline_target_compliant",
    "target_capture_backend_integrated",
    "os_video_handle_audit_available",
    "legacy_mjpeg_clients_absent",
    "target_ready",
    "target_architecture_compliant",
]
required_device_nodes = [
    "/dev/mpp_service",
    "/dev/rga",
    "/dev/dma_heap",
    "/dev/dri/renderD128",
    "/dev/dri/by-path/platform-fdab0000.npu-render",
]
required_packages = [
    "ffmpeg",
    "librockchip-mpp1",
    "librockchip-mpp-dev",
    "librga2",
    "librga-dev",
    "libv4l-rkmpp",
    "rockchip-multimedia-config",
    "rockchip-mpp-demos",
    "v4l-utils",
]
probe_command = "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_camera_transport_stack.py"
acceptance_probe_commands = [
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_camera_transport_stack.py",
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_camera_handle_stability.py --role c_channel_2 --clients 2",
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_gstreamer_target_capture_pipeline.py --all-assigned",
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_camera_calibration_ring.py --all-assigned",
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_webrtc_view_scaling.py --role c_channel_2 --views 3",
    "cd /home/orangepi/sorter-v2/software/sorter/backend && .venv/bin/python scripts/probe_rk3588_npu_stack.py --require-inference",
]

[camera_transport.backend_env]
SORTER_CAMERA_CAPTURE_BACKEND = "gstreamer_mpp"
SORTER_ENABLE_GSTREAMER_MPP_CAPTURE = "1"
SORTER_ENABLE_FFMPEG_RKMPP_WEBRTC = "1"
