# This file is for setting / tuning parameters that will likely vary between
# machines. Set MACHINE_SPECIFIC_PARAMS_PATH env var to point to your copy.

# --- Servo configuration ---
# backend = "pca9685" (default) uses the PCA9685 I2C servo controller on the
# SKR Pico distribution board. Requires open_angle/closed_angle.
#
# backend = "waveshare" uses Waveshare SC series serial bus servos (SC09, etc.)
# with auto-calibration. Only servo bus IDs are needed — open/close positions
# are found automatically by stepping to physical limits on first run.

[servo]
# For PCA9685 (default):
# backend = "pca9685"
open_angle = 10
closed_angle = 83

# For Waveshare SC bus servos, uncomment below:
# backend = "waveshare"
# port = "/dev/cu.usbmodem5A7C1215731"  # optional, auto-detected if omitted
#
# [[servo.channels]]
# id = 1
# invert = false
#
# [[servo.channels]]
# id = 2
# invert = false

# --- Chute positioning calibration ---
# These values define where the first bin center sits after homing and how much
# angular width each divider pillar consumes. They directly affect how the chute
# computes bin center positions around the ring.

# [chute]
# first_bin_center = 8.4
# pillar_width_deg = 1.9

# --- Camera configuration ---
# layout = "default" (default): single feeder camera + classification cameras.
#   Camera indices come from data.json (via scripts/camera_setup.py).
#
# layout = "split_feeder": separate camera per c-channel + carousel.
#   Indices are OpenCV device indices.
#   Carousel and classification cameras may also use a URL source
#   (e.g. MJPEG stream from IP Webcam app via ADB or a local scrcpy bridge).

# [cameras]
# layout = "split_feeder"
# c_channel_2 = 0
# c_channel_3 = 2
# carousel = 4
# carousel = "http://127.0.0.1:18081/carousel.mjpg" # Android phone via scrcpy bridge
# classification_top = "http://localhost:8080/video"   # Android phone via ADB
# classification_bottom = 3                             # or a USB camera index

# [camera_picture_settings.c_channel_2]
# brightness = 0
# contrast = 1.0
# saturation = 1.0
# gamma = 1.0

# [camera_picture_settings.carousel]
# brightness = 8
# contrast = 1.1
# saturation = 1.0
# gamma = 1.0

[stepper_current_overrides]
# default = 16, max = 31

[stepper_current_overrides.chute_stepper]
irun = 16
