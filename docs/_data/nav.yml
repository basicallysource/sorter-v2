# Top-level navigation structure for the Sorter V2 documentation site.
#
# Each section listed here renders as a top-nav item. Pages within a section
# render as left-sidebar items when the user is inside that section. A section
# may optionally carry `groups`, which render as labeled sub-sections in the
# sidebar — use this when a section holds more than one research area or
# contributor reference that should stay visually separated.
#
# Pages opt into a section by setting `section: <id>` in their frontmatter.
#
# Single source of truth — both the top nav and the per-section sidebar
# in _layouts/default.html read from this file.

sections:
  - id: hardware
    title: Hardware
    url: /hardware/
    description: The physical machine — mechanics, electronics, BOM, assembly.
    pages:
      - title: Overview
        url: /hardware/
