# When NetworkManager spins up shared mode for the sorteros-ap connection
# it starts a dnsmasq instance and reads every *.conf in this directory.
# Sending every name to 10.42.0.1 is the trick that makes captive-portal
# detection probes from iOS / Android / Windows / Firefox land on us, so
# the device OS automatically opens a browser tab to the portal.
address=/#/10.42.0.1
