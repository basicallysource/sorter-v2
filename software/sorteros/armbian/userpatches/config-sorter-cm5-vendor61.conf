# Non-interactive Armbian build config for SorterOS Phase 0 on Orange Pi CM5.
# Source this via:
#   ./compile.sh sorter-cm5-vendor61
# or let build-sorteros-armbian-cm5.sh copy it into armbian/build/userpatches.

BOARD=orangepi-cm5-sorter
BRANCH=vendor
RELEASE=noble
BUILD_MINIMAL=yes
BUILD_DESKTOP=no
KERNEL_CONFIGURE=no
KERNEL_BTF=no
EXPERT=yes
SHARE_LOGS=no
INSTALL_HEADERS=yes

# Keep DNS deterministic inside the chroot.
NAMESERVER=$(grep nameserver /etc/resolv.conf | awk '{ print $2 }' | head -n 1)
