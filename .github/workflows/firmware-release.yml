name: Firmware Release

on:
  push:
    tags:
      - 'firmware/v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Clone Pico SDK
        working-directory: software/firmware/sorter_interface_firmware
        run: make setup

      - name: Build feeder-v1-1
        working-directory: software/firmware/sorter_interface_firmware
        run: make build-feeder-v1-1

      - name: Build distribution-v1-1
        working-directory: software/firmware/sorter_interface_firmware
        run: make build-distribution-v1-1

      - name: Build distribution-v1-2
        working-directory: software/firmware/sorter_interface_firmware
        run: make build-distribution-v1-2

      - name: Build distribution-skr
        working-directory: software/firmware/sorter_interface_firmware
        run: make build-distribution-skr

      - name: Rename artifacts
        working-directory: software/firmware/sorter_interface_firmware
        run: |
          TAG=${GITHUB_REF_NAME//\//-}
          cp build-feeder-v1-1/sorter_interface_firmware.uf2        feeder-v1-1_${TAG}.uf2
          cp build-distribution-v1-1/sorter_interface_firmware.uf2   distribution-v1-1_${TAG}.uf2
          cp build-distribution-v1-2/sorter_interface_firmware.uf2   distribution-v1-2_${TAG}.uf2
          cp build-distribution-skr/sorter_interface_firmware.uf2    distribution-skr_${TAG}.uf2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Firmware files

            Flash the `.uf2` for your board revision and role. Hold BOOTSEL while plugging in the Pico, then drag the file onto the RPI-RP2 drive.

            | File | Board | Role |
            |------|-------|------|
            | `feeder-v1-1_*.uf2` | Basically v1-1 | Feeder MB |
            | `distribution-v1-1_*.uf2` | Basically v1-1 | Distribution MB |
            | `distribution-v1-2_*.uf2` | Basically v1-2 | Distribution MB |
            | `distribution-skr_*.uf2` | SKR Pico | Distribution MB |

          files: |
            software/firmware/sorter_interface_firmware/feeder-v1-1_*.uf2
            software/firmware/sorter_interface_firmware/distribution-v1-1_*.uf2
            software/firmware/sorter_interface_firmware/distribution-v1-2_*.uf2
            software/firmware/sorter_interface_firmware/distribution-skr_*.uf2
